services:
  postgres:
    image: postgres:16
    container_name: sneaker-intel-pg
    environment:
      POSTGRES_USER: sneaker
      POSTGRES_PASSWORD: sneaker
      POSTGRES_DB: sneaker_intel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sneaker -d sneaker_intel"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
