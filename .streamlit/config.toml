# Sam Malik design system — "Two Currents" (void + bone, phosphor signal).
[theme]
base = "dark"
primaryColor = "#c8f24a"            # phosphor — interactive / signal / chart default
backgroundColor = "#0b0b0f"         # void — primary background
secondaryBackgroundColor = "#131318" # slab — sidebar, widgets, table rows
textColor = "#ece7d8"               # bone — warm paper white
font = "sans serif"                 # real families applied via CSS (Space Grotesk / Cormorant / Plex Mono)
